<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小马识字乐园</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="title">
        <span class="sparkle">✦</span>
        <h1>小马识字乐园</h1>
        <span class="sparkle">✦</span>
      </div>
    </header>

    <main class="stage">
      <div id="cardStack" class="card-stack">
        <div id="card" class="card">
          <div class="card-inner">
            <div class="top-row">
              <div class="left-section">
                <div class="pinyin-box" id="pinyinBox">pīn yīn</div>
                <div class="tianzi">
                  <div class="tianzi-grid">
                    <div class="hanzi" id="hanzi">字</div>
                  </div>
                </div>
              </div>
              <div class="right-section">
                <div class="pic-wrap">
                  <img id="wordPic" src="" alt="" />
                </div>
              </div>
            </div>
            <div class="bottom-row">
              <div class="bihui-bar">
                <span class="bihui-label">笔顺</span>
                <span class="bihui-text" id="bihui">一 丿 丨 フ 一</span>
              </div>
              <div class="info-row">
                <span class="info-label cizu">组词</span>
                <span class="info-text" id="cizu1">石头 山石 石油</span>
              </div>
              <div class="info-row">
                <span class="info-label zaoju">造句</span>
                <span class="info-text" id="zaoju">雨花石是一种漂亮的石头。</span>
              </div>
            </div>
          </div>
          <div class="card-bg-hint" id="cardBgHint"></div>
        </div>
      </div>
      <div class="pony-quotes" id="ponyQuotes"></div>
    </main>

    <footer class="bottom-bar">
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="dayLabel">第 1 组</span>
          <span id="sessionProgress">0 / 5</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
    </footer>
  </div>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
